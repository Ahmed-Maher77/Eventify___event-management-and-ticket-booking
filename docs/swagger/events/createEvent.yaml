paths:
  /api/events:
    post:
      summary: Create a new event (Admin only)
      tags:
        - Events
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - description
                - date
                - location
                - category
                - capacity
                - price
              properties:
                title:
                  type: string
                  description: Event title
                  example: "Music Festival 2026"
                description:
                  type: string
                  description: Event description
                  example: "Annual music festival featuring local and international artists"
                date:
                  type: string
                  format: date-time
                  description: Event date and time
                  example: "2026-08-15T18:00:00.000Z"
                location:
                  type: string
                  description: Event location
                  example: "Central Park, New York"
                category:
                  type: string
                  enum:
                    - concert
                    - conference
                    - workshop
                    - seminar
                    - sports
                    - other
                  description: Event category
                  example: "concert"
                capacity:
                  type: integer
                  minimum: 1
                  description: Total event capacity
                  example: 500
                price:
                  type: number
                  minimum: 0
                  description: Event price (can be 0 for free events)
                  example: 50.00
                image:
                  type: string
                  format: binary
                  description: Optional image file uploaded with key `image` (Multer + Cloudinary)
                imageUrl:
                  type: string
                  format: uri
                  description: Optional direct image URL. If provided without file, this URL is used.
                  example: "https://example.com/event-cover.jpg"
      responses:
        '201':
          description: Event created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Event created successfully"
                  data:
                    $ref: '#/components/schemas/Event'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: "Authentication required to create event"
        '403':
          description: Forbidden - Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
