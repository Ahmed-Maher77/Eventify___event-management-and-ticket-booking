paths:
  /api/bookings:
    post:
      summary: Create a new booking
      tags:
        - Bookings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventId
                - quantity
              properties:
                eventId:
                  type: string
                  description: Event MongoDB ObjectId
                  example: "60d5ec49f1b2c8b1f8e4e1a2"
                quantity:
                  type: integer
                  minimum: 1
                  description: Number of seats to book
                  example: 2
      responses:
        '201':
          description: Booking created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Booking created successfully"
                  data:
                    $ref: '#/components/schemas/Booking'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found or unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                eventNotFound:
                  summary: Event not found
                  value:
                    success: false
                    message: "Event is not found."
                seatsUnavailable:
                  summary: Not enough seats
                  value:
                    success: false
                    message: "Not enough available seats."
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'