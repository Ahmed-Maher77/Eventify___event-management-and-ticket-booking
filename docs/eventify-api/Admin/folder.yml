info:
  name: Admin
  type: folder
  seq: 4

http:
  headers:
    - name: content-type
      value: application/json
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        // Ensure auth token is available for admin requests
        const token = bru.getEnvVar('authToken');
        if (!token) {
          console.warn('Warning: No auth token available. Please login first with an admin account.');
        }
    - type: tests
      code: |-
        // Common tests for admin requests
        test("Response time is acceptable", function() {
          expect(res.responseTime).to.be.below(5000);
        });

docs:
  content: |-
    # Admin Endpoints

    Administrative endpoints for cross-user management tasks.

    ## Authentication
    Requires an admin JWT token in the Authorization header.
  type: text/markdown