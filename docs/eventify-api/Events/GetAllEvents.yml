info:
  name: GetAllEvents
  type: http
  seq: 1
  tags:
    - events
    - public

http:
  method: GET
  url: "{{baseUrl}}/api/events?page=1&limit=10"
  headers:
    - name: content-type
      value: application/json
  params:
    query:
      - name: page
        value: "1"
      - name: limit
        value: "10"
      - name: search
        value: ""
        disabled: true
      - name: category
        value: ""
        disabled: true
      - name: sort
        value: date
      - name: order
        value: desc
  auth:
    type: none

runtime:
  scripts:
    - type: after-response
      code: |-
        // Save event ID if available
        if (res.status === 200 && res.body.data.events.length > 0) {
          bru.setEnvVar("eventId", res.body.data.events[0]._id);
          console.log('First event ID saved: ' + res.body.data.events[0]._id);
        }
    - type: tests
      code: |-
        test("Status is 200 OK", function() {
          expect(res.status).to.equal(200);
        });

        test("Response has events array", function() {
          expect(res.body.data).to.have.property('events');
          expect(res.body.data.events).to.be.an('array');
        });

        test("Response has pagination", function() {
          expect(res.body.data).to.have.property('pagination');
          expect(res.body.data.pagination).to.have.property('currentPage');
          expect(res.body.data.pagination).to.have.property('totalPages');
          expect(res.body.data.pagination).to.have.property('totalEvents');
        });

        test("Events have required fields", function() {
          if (res.body.data.events.length > 0) {
            const event = res.body.data.events[0];
            expect(event).to.have.property('_id');
            expect(event).to.have.property('title');
            expect(event).to.have.property('description');
            expect(event).to.have.property('date');
            expect(event).to.have.property('location');
            expect(event).to.have.property('category');
          }
        });

        test("Success is true", function() {
          expect(res.body.success).to.equal(true);
        });

  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.success
      operator: eq
      value: "true"
    - expression: res.body.data.events
      operator: isArray

settings:
  encodeUrl: true
  timeout: 30000

docs:
  content: |-
    # Get All Events

    Retrieve all events with filtering and pagination support.

    ## Query Parameters
    - `page` (integer, default: 1): Page number
    - `limit` (integer, default: 10): Items per page
    - `search` (string, optional): Search in title and description
    - `category` (string, optional): Filter by category (concert, conference, workshop, seminar, sports, other)
    - `location` (string, optional): Filter by location
    - `minPrice` (number, optional): Minimum price filter
    - `maxPrice` (number, optional): Maximum price filter
    - `startDate` (date, optional): Filter events from this date
    - `endDate` (date, optional): Filter events until this date
    - `sort` (string, default: date): Sort field (date, price, title, createdAt)
    - `order` (string, default: desc): Sort order (asc, desc)

    ## Response
    Returns array of events with pagination info.
  type: text/markdown
